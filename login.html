<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PlayRewards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card glass">
      <h2 style="margin-bottom: 8px; text-align: center;">Welcome Back</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px; text-align: center;">Login to resume watching reward tasks.</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
          Sign In
        </button>
      </form>

      <p style="margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); text-align: center;">
        Don't have an account? <a href="signup.html" style="color: var(--accent); text-decoration: none;">Register here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { loginUser } from './js/auth.js';
    
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      await loginUser(email, password);
    });
  </script>
</body>
</html>
