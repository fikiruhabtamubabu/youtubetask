<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral - PlayRewards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="dashboard-layout">
    <aside class="glass">
      <a href="index.html" class="logo">
        <i class="fab fa-youtube"></i> Play<span>Rewards</span>
      </a>
      <ul class="menu-list">
        <li><a href="dashboard.html" class="menu-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="balance.html" class="menu-link"><i class="fas fa-wallet"></i> Balance</a></li>
        <li><a href="referral.html" class="menu-link active"><i class="fas fa-user-plus"></i> Referral</a></li>
        <li><a href="withdraw.html" class="menu-link"><i class="fas fa-money-bill-transfer"></i> Withdraw</a></li>
        <li><a href="profile.html" class="menu-link"><i class="fas fa-user-cog"></i> Profile</a></li>
      </ul>
    </aside>

    <main class="content">
      <h2 style="margin-bottom:32px;">Referral Program</h2>
      <div class="glass" style="padding:32px; margin-bottom:24px;">
        <h3 style="margin-bottom:16px;">Your Promo Code Link</h3>
        <div style="display:flex; gap:16px;">
          <input type="text" id="referral-link" readonly style="flex-grow:1; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px; color:#fff;">
          <button class="btn-primary" id="copy-referral-btn">Copy</button>
        </div>
      </div>
      <div class="glass" style="padding:32px;">
        <h3 style="margin-bottom:16px;">Your Referrals</h3>
        <div id="referral-history"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/referral.js"></script>
</body>
</html>
