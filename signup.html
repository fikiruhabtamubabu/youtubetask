  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card glass">
      <h2 style="margin-bottom: 8px; text-align: center;">Register Account</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px; text-align: center;">Create your account instantly to start earning.</p>
      
      <form id="signup-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
          Create Account
        </button>
      </form>

      <p style="margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); text-align: center;">
        Already registered? <a href="login.html" style="color: var(--accent); text-decoration: none;">Login here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { signupUser } from './js/auth.js';
    
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref');

      await signupUser(email, password, name, ref);
    });
  </script>
</body>
</html>
