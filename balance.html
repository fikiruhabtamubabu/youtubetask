<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance & Transactions - PlayRewards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Mobile Sticky Top Header (Visible only on mobile) -->
  <header class="mobile-top-nav">
    <a href="index.html" class="logo" style="font-size: 1.25rem;">
      <i class="fab fa-youtube"></i> Play<span>Rewards</span>
    </a>
    <button id="mobile-menu-trigger" class="mobile-menu-toggle">
      <i class="fas fa-bars"></i>
    </button>
  </header>

  <div class="dashboard-layout">
    <!-- Sidebar Menu (Acts as full-screen overlay on mobile) -->
    <aside class="glass">
      <a href="index.html" class="logo">
        <i class="fab fa-youtube"></i> Play<span>Rewards</span>
      </a>
      <ul class="menu-list">
        <li><a href="dashboard.html" class="menu-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="balance.html" class="menu-link active"><i class="fas fa-wallet"></i> Balance</a></li>
        <li><a href="referral.html" class="menu-link"><i class="fas fa-user-plus"></i> Referral</a></li>
        <li><a href="withdraw.html" class="menu-link"><i class="fas fa-money-bill-transfer"></i> Withdraw</a></li>
        <li><a href="profile.html" class="menu-link"><i class="fas fa-user-cog"></i> Profile</a></li>
      </ul>
    </aside>

    <main class="content">
      <h2 style="margin-bottom:32px;">Your Wallet & Earnings</h2>
      
      <div class="stats-grid">
        <div class="stat-card glass">
          <div style="color: var(--text-muted);">Current Balance</div>
          <div class="stat-val" id="wallet-balance" style="color: var(--accent);">$0.00</div>
        </div>
        <div class="stat-card glass">
          <div style="color: var(--text-muted);">Today's Earnings</div>
          <div class="stat-val" id="today-earnings" style="color: var(--success);">$0.00</div>
        </div>
        <div class="stat-card glass">
          <div style="color: var(--text-muted);">Total Lifetime Earnings</div>
          <div class="stat-val" id="lifetime-earnings">$0.00</div>
        </div>
      </div>

      <div class="glass" style="padding: 32px;">
        <h3 style="margin-bottom: 24px;">Transaction History</h3>
        <div id="transaction-history-list">
          <p style="color: var(--text-muted);">Querying transactions...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/balance.js"></script>
</body>
</html>
