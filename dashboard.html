<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - PlayRewards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Popup Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(8, 9, 13, 0.95);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(12px);
      padding: 24px;
    }
    .modal-card {
      width: 100%;
      max-width: 720px;
      padding: 24px;
      position: relative;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-timer {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .modal-close-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: #fff;
      font-size: 1.2rem;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .modal-close-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: #EF4444;
      color: #EF4444;
    }
    .iframe-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .iframe-wrapper div {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
    }
    .pagination-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="dashboard-layout">
    <aside class="glass">
      <a href="index.html" class="logo">
        <i class="fab fa-youtube"></i> Play<span>Rewards</span>
      </a>
      <ul class="menu-list">
        <li><a href="dashboard.html" class="menu-link active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="balance.html" class="menu-link"><i class="fas fa-wallet"></i> Balance</a></li>
        <li><a href="referral.html" class="menu-link"><i class="fas fa-user-plus"></i> Referral</a></li>
        <li><a href="withdraw.html" class="menu-link"><i class="fas fa-money-bill-transfer"></i> Withdraw</a></li>
        <li><a href="profile.html" class="menu-link"><i class="fas fa-user-cog"></i> Profile</a></li>
      </ul>
    </aside>

    <main class="content">
      <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <div>
          <h2>Available Tasks</h2>
          <p style="color: var(--text-muted);">Watch videos, collect rewards, and earn balance points.</p>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="glass" style="padding: 8px 16px; font-weight:600;" id="user-display-balance">$0.00</div>
          <img id="user-avatar" src="" alt="avatar" style="width:48px; height:48px; border-radius:50%; border:2px solid var(--accent);">
        </div>
      </header>

      <!-- Grid of Available YouTube Tasks -->
      <div class="task-grid" id="tasks-container">
        <!-- Dynamically filled with up to 10 tasks -->
      </div>

      <!-- Pagination Buttons -->
      <div class="pagination-bar">
        <button id="prev-page-btn" class="btn-secondary" style="padding: 10px 20px;" disabled>
          <i class="fas fa-arrow-left"></i> Previous
        </button>
        <button id="next-page-btn" class="btn-secondary" style="padding: 10px 20px;" disabled>
          Next <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </main>
  </div>

  <!-- Built-in Watch Modal Popup -->
  <!-- Built-in Watch Modal Popup with Custom Play Overlay -->
  <div id="watch-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card glass">
      <div class="modal-header">
        <div>
          <h3 id="modal-title">Loading task...</h3>
          <p id="modal-status-text" style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">
            Click the play button to start watching.
          </p>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
          <div class="modal-timer" id="modal-timer-countdown">00:00</div>
          <button class="modal-close-btn" id="modal-close-btn" title="Cancel Task">&times;</button>
        </div>
      </div>
      <div class="iframe-wrapper" style="position: relative;">
        <!-- Container for iframe -->
        <div id="modal-video-frame" style="width: 100%; height: 100%;"></div>
        
        <!-- Custom Play Overlay -->
        <div id="video-play-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 9, 13, 0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border-radius: var(--radius); transition: var(--transition);">
          <div class="btn-primary" style="padding: 16px 32px; font-size: 1.2rem; border-radius: 50px; box-shadow: 0 0 25px rgba(0, 229, 255, 0.35);">
            <i class="fas fa-play" style="margin-right: 8px;"></i> Click to Play & Verify
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Global scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
